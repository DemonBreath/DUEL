name: Deploy Linux Server

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and deploy
        required: true
        default: main

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6.2"
  GODOT_STATUS: "stable"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install Godot and export templates
        run: bash ./tools/install-godot-ci.sh "$GODOT_VERSION" "$GODOT_STATUS"

      - name: Export Linux server package
        run: bash ./tools/export-linux-server.sh

      - name: Upload Linux server artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-server-package
          path: |
            .codex-run/linux-server
            .codex-run/linux-server.tar.gz
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-24.04
    needs: build
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Download Linux server artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-server-package
          path: .codex-run

      - name: Configure SSH
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Debug SSH host matching
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          echo "DEPLOY_SSH_HOST=$DEPLOY_SSH_HOST"
          echo "DEPLOY_SSH_PORT=$DEPLOY_SSH_PORT"
          echo "known_hosts line count: $(wc -l < "$HOME/.ssh/known_hosts")"
          echo "known_hosts preview:"
          sed -n '1,5p' "$HOME/.ssh/known_hosts"
          echo "ssh-keygen lookup by host:"
          ssh-keygen -F "$DEPLOY_SSH_HOST" -f "$HOME/.ssh/known_hosts" || true
          echo "ssh-keyscan live host key:"
          ssh-keyscan -p "$DEPLOY_SSH_PORT" "$DEPLOY_SSH_HOST" 2>/dev/null || true

      - name: Deploy Linux server to VM
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_TARGET_DIR: ${{ secrets.DEPLOY_TARGET_DIR }}
          DEPLOY_RESTART_COMMAND: ${{ secrets.DEPLOY_RESTART_COMMAND }}
        run: bash ./tools/deploy-linux-server.sh

#
# Required GitHub Secrets for this workflow:
# - DEPLOY_SSH_HOST: hostname or IP of the Linux VM
# - DEPLOY_SSH_PORT: SSH port, usually 22
# - DEPLOY_SSH_USER: SSH username on the VM
# - DEPLOY_SSH_PRIVATE_KEY: private key with write access to the target directory
# - DEPLOY_SSH_KNOWN_HOSTS: output of "ssh-keyscan -H <host>"
# - DEPLOY_TARGET_DIR: runtime directory on the VM that should contain DUEL.x86_64 and DUEL.pck,
#   for example /home/alexandercampbell
# - DEPLOY_RESTART_COMMAND: exact remote restart command, for example:
#   pkill -f '/home/alexandercampbell/DUEL.x86_64 --headless' || true; nohup /home/alexandercampbell/DUEL.x86_64 --headless --server-port=8910 >/home/alexandercampbell/duel-server.log 2>&1 < /dev/null &
